name: release-windows

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/atlas/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Install Python dependencies
        run: |
          .\.venv\Scripts\python.exe -m pip install --upgrade pip
          .\.venv\Scripts\python.exe -m pip install -r requirements.txt
          .\.venv\Scripts\python.exe -m pip install -e .

      - name: Install frontend dependencies
        working-directory: apps/atlas
        run: npm.cmd ci

      - name: Resolve Atlas version
        id: version
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/*') {
            $version = .\.venv\Scripts\python.exe .\scripts\check_atlas_version.py --tag $env:GITHUB_REF_NAME
          } else {
            $version = .\.venv\Scripts\python.exe .\scripts\check_atlas_version.py
          }
          "atlas_version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build Atlas MSI release bundle
        run: .\scripts\build_atlas_release.ps1

      - name: Build Atlas MSIX Store package
        if: ${{ vars.ATLAS_MSIX_IDENTITY_NAME != '' && vars.ATLAS_MSIX_PUBLISHER != '' }}
        env:
          ATLAS_MSIX_IDENTITY_NAME: ${{ vars.ATLAS_MSIX_IDENTITY_NAME }}
          ATLAS_MSIX_PUBLISHER: ${{ vars.ATLAS_MSIX_PUBLISHER }}
          ATLAS_MSIX_PUBLISHER_DISPLAY_NAME: ${{ vars.ATLAS_MSIX_PUBLISHER_DISPLAY_NAME }}
        run: .\scripts\build_atlas_msix.ps1 -SkipTauriBuild

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: atlas-windows-v${{ steps.version.outputs.atlas_version }}
          path: |
            apps/atlas/src-tauri/target/release/bundle/**/*.msi
            output/msix/packages/*.msix

      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Atlas v${{ steps.version.outputs.atlas_version }}
          files: |
            apps/atlas/src-tauri/target/release/bundle/**/*.msi
            output/msix/packages/*.msix
          fail_on_unmatched_files: false
          generate_release_notes: true
