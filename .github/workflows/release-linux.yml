name: release-linux

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Linux desktop build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            wget

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/atlas/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Install Python dependencies
        run: |
          ./.venv/bin/python -m pip install --upgrade pip
          ./.venv/bin/python -m pip install -r requirements.txt
          ./.venv/bin/python -m pip install -e .

      - name: Install frontend dependencies
        working-directory: apps/atlas
        run: npm ci

      - name: Resolve Atlas version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            version="$(./.venv/bin/python ./scripts/check_atlas_version.py --tag "$GITHUB_REF_NAME")"
          else
            version="$(./.venv/bin/python ./scripts/check_atlas_version.py)"
          fi
          echo "atlas_version=$version" >> "$GITHUB_OUTPUT"

      - name: Build Atlas Linux release bundles
        working-directory: apps/atlas
        run: npm run tauri build -- --ci

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: atlas-linux-v${{ steps.version.outputs.atlas_version }}
          path: |
            apps/atlas/src-tauri/target/release/bundle/deb/*.deb
            apps/atlas/src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Atlas v${{ steps.version.outputs.atlas_version }}
          files: |
            apps/atlas/src-tauri/target/release/bundle/deb/*.deb
            apps/atlas/src-tauri/target/release/bundle/appimage/*.AppImage
          fail_on_unmatched_files: true
          generate_release_notes: true
